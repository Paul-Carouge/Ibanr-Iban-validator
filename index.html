    <style>

            --primary: #2563eb; --primary-hover: #1d4ed8;
            --bg: #f8fafc; --card-bg: #ffffff;
            --text-main: #0f172a; --text-muted: #64748b;

            --modal-overlay: rgba(0, 0, 0, 0.4);

        }

        .dark-theme {
            --primary: #3b82f6; --primary-hover: #60a5fa;
            --bg: #09090b; --card-bg: #18181b;
            --text-main: #fafafa; --text-muted: #a1a1aa;
            --border: #27272a; --success: #10b981; --danger: #ef4444;
            --grid-color: #27272a;
            --block-bg: #27272a; --input-bg: #09090b;
            --shadow-opacity: 0.6;
            --modal-overlay: rgba(0, 0, 0, 0.75);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font); color: var(--text-main);
            background-color: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; padding: 40px 20px; transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
        }

        .grid-bg {
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background-image: radial-gradient(var(--grid-color) 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
            transition: all 0.4s ease;
        }

        .floating-controls {
            position: absolute; top: 24px; right: 24px;
            display: flex; gap: 12px; z-index: 50;
        }

        .icon-btn {
            background: var(--card-bg); border: 1px solid var(--border); color: var(--text-muted);
            border-radius: 12px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; outline: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,var(--shadow-opacity));
            transition: border-color 0.2s, color 0.2s, background-color 0.2s;
        }
        .icon-btn:hover { border-color: var(--primary); color: var(--primary); }

        .container { width: 100%; max-width: 1000px; position: relative; z-index: 10; display: flex; flex-direction: column; gap: 24px;}

        .card {
            background: var(--card-bg); border-radius: 24px; padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, var(--shadow-opacity)); border: 1px solid var(--border);
            display: flex; gap: 40px; align-items: stretch; min-height: 480px;
            transition: background-color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .layout-left { flex: 0 0 340px; display: flex; flex-direction: column; }
        .layout-right { 
            flex: 1; display: flex; flex-direction: column; 
            background: var(--input-bg); border-radius: 16px; border: 1px solid var(--border); 
            padding: 32px; overflow: hidden; position: relative;
            transition: background-color 0.4s ease, border-color 0.4s ease;

        header { margin-bottom: 24px; }
        h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.03em; display: flex; align-items: center; gap: 10px;}
        .logo-icon { color: var(--primary); }

        .segmented-control {
            display: flex; background: var(--input-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 4px; margin-bottom: 24px; gap: 4px;

        .form-section { flex: 1; display: flex; flex-direction: column; }
        .field-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.05em; }
        select, input {
            width: 100%; background: var(--input-bg); border: 2px solid var(--border); border-radius: 12px;

        .btn-generate {
            background: var(--primary); color: white; border: none; border-radius: 12px; padding: 16px 20px;
            font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: auto;
        }

        .section-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 24px; display: flex; align-items: center; gap: 8px;}

        .blocks-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 32px; }
        .iban-block {
            background: var(--block-bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px;
            font-family: var(--font-mono); font-size: 20px; font-weight: 700; cursor: pointer; color: var(--text-main);
            display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 2px 4px rgba(0,0,0,var(--shadow-opacity));
            transition: background-color 0.4s ease, border-color 0.4s ease, color 0.2s ease;
        }

        .val-result { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
        .val-icon { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .val-icon.success { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .val-icon.error { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .val-icon.neutral { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-muted); }

        .modal-overlay { position: fixed; inset: 0; background: var(--modal-overlay); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 1000; transition: background-color 0.4s ease;}
        .modal-content { background: var(--card-bg); border-radius: 24px; padding: 32px; width: 100%; max-width: 550px; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,var(--shadow-opacity)); transition: background-color 0.4s ease;}
        .history-list { display: flex; flex-direction: column; gap: 10px; max-height: 350px; overflow-y: auto; padding-right: 5px; margin-top: 20px; }
        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .history-item { font-family: var(--font-mono); padding: 16px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; color: var(--text-main); transition: background-color 0.4s ease;}

        footer { font-size: 13px; color: var(--text-muted); text-align: center; }
        footer a { color: var(--text-main); text-decoration: none; font-weight: 700; transition: color 0.2s; }
        footer a:hover { color: var(--primary); }

        kbd { background: var(--input-bg); border: 1px solid var(--border); padding: 4px 8px; border-radius: 6px; font-size: 10px; font-family: var(--font-mono); color: var(--text-main); font-weight: 700;}

        .toast {
            position: fixed; bottom: 32px; left: 50%;
            background: var(--text-main); color: var(--bg); padding: 14px 28px; border-radius: 99px;
            font-size: 14px; font-weight: 600; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 9999;
            display: flex; align-items: center; gap: 10px; pointer-events: none;
            border: 1px solid rgba(255,255,255,0.1);
        }

        @media (max-width: 900px) {
            .card { flex-direction: column; gap: 24px; min-height: auto;}
            .layout-left { flex: auto; width: 100%; }
        }

        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 600; color: var(--text-muted); display: flex; align-items: center; gap: 12px; }
    </style>
</head>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- I18N DICTIONARY & QUOTES ---
        const i18n = {
            fr: {

                historyTitle: 'Historique récent', themeTitle: 'Changer le thème', langTitle: 'Switch to English',

            en: {

                historyTitle: 'Recent History', themeTitle: 'Toggle Theme', langTitle: 'Passer en Français',
                selectCountry: 'Target Country',
                btnGen: 'Generate IBAN',
                spaceHint: 'to regenerate', copyAllHint: 'Copy all',
                standardFormat: 'Standard Format (Click to copy)',
                copyFullBtn: 'Copy Full IBAN',
                pasteIban: 'Paste an IBAN',
                valSubtitle: 'Instantly verify structural compliance (Modulo 97 - ISO 13616 Standard).',
                valWait: 'Waiting',
                valWaitDesc: 'Paste an IBAN on the left to start the analysis.',
                valValid: 'Valid IBAN',

                bulkBtn: 'Export to CSV',
                bulkReady: 'Ready for export',
                bulkReadyDesc: 'The CSV file will be generated with spaced blocks for easy reading in your spreadsheet software.',
                toastCopied: 'Copied',
                toastBlock: 'Block copied',
                toastFull: 'Full IBAN',
                toastHistory: 'Copied from history',

                madeBy: 'Created by'
            }
        };

        const countryLabels = {
            fr: { FR: '🇫🇷 France', DE: '🇩🇪 Allemagne', ES: '🇪🇸 Espagne', IT: '🇮🇹 Italie', BE: '🇧🇪 Belgique', GB: '🇬🇧 Royaume-Uni' },
            en: { FR: '🇫🇷 France', DE: '🇩🇪 Germany', ES: '🇪🇸 Spain', IT: '🇮🇹 Italy', BE: '🇧🇪 Belgium', GB: '🇬🇧 United Kingdom' }
        };

        // VIDEO GAME QUOTES
        const funnyQuotes = {
            fr: [
                "« C'est dangereux d'y aller seul ! Prends ça. » - The Legend of Zelda",
                "« Le gâteau est un mensonge. » - Portal",
                "« Moi aussi j'étais aventurier, et puis j'ai pris une flèche dans le genou. » - Skyrim",
                "« La guerre... La guerre ne meurt jamais. » - Fallout",
                "« Loué soit le soleil ! » - Dark Souls",
                "« Toutes vos bases sont appartiennent à nous. » - Zero Wing"
            ],
            en: [
                "« It's dangerous to go alone! Take this. » - The Legend of Zelda",
                "« The cake is a lie. » - Portal",
                "« I used to be an adventurer like you, then I took an arrow in the knee. » - Skyrim",
                "« War. War never changes. » - Fallout",
                "« Praise the sun! » - Dark Souls",
                "« All your base are belong to us. » - Zero Wing"
            ]
        };

        // --- LUCIDE ICONS ---
        const Icon = ({ path, size = 20, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
        );
        const icons = {
            sparkles: `<path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>`,
            copy: `<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>`,
            history: `<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>`,
            sun: `<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>`,
            moon: `<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>`,
            check: `<polyline points="20 6 9 17 4 12"/>`,
            x: `<path d="M18 6 6 18"/><path d="m6 6 12 12"/>`,
            download: `<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>`,
            wallet: `<path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>`,
            shield: `<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>`,
            database: `<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/>`
        };

        // --- DATA & ALGORITHMS ---
        const blockConfig = { 'FR': [4,4,4,4,4,4,3], 'DE': [4,4,4,4,4,2], 'ES': [4,4,4,4,4,4], 'IT': [4,4,4,4,4,4,3], 'BE': [4,4,4,4], 'GB': [4,4,4,4,4,2] };
        const bankData = {
            'FR': [{ code: '30004' },{ code: '30003' },{ code: '20041' }],
            'DE': [{ code: '10040000' },{ code: '10070000' }],
            'GB': [{ code: 'BARC', sort: '200000' }],
            'ES': [{ code: '0049' }],
            'IT': [{ code: '03069' }],
            'BE': [{ code: '310' }]
        };

        const generateRawIban = (country) => {
            const bankList = bankData[country];
            const bank = bankList[Math.floor(Math.random() * bankList.length)];
            const rd = (len) => Array.from({length: len}, () => Math.floor(Math.random() * 10)).join('');
            let bban = '';
            
            if (country === 'FR') {
                const frB = bank.code; const frG = rd(5); const frC = rd(11);
                const calcFr = 97n - ((89n * BigInt(frB) + 15n * BigInt(frG) + 3n * BigInt(frC)) % 97n);
                bban = frB + frG + frC + calcFr.toString().padStart(2, '0');
            } else if (country === 'DE') bban = bank.code + rd(10);
            else if (country === 'GB') bban = bank.code + bank.sort + rd(8);
            else if (country === 'ES') bban = bank.code + rd(4) + rd(2) + rd(10);
            else if (country === 'IT') bban = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random() * 26)] + bank.code + rd(5) + rd(12);
            else if (country === 'BE') {
                const beNum = bank.code + rd(7);
                let mod = BigInt(beNum) % 97n; if(mod === 0n) mod = 97n;
                bban = beNum + mod.toString().padStart(2, '0');
            }
            
            const numStr = (bban + country + "00").split('').map(c => /[A-Z]/.test(c) ? (c.charCodeAt(0)-55).toString() : c).join('');
            const cs = (98n - (BigInt(numStr) % 97n)).toString().padStart(2, '0');
            return country + cs + bban;
        };

        const formatIban = (iban) => iban.match(/.{1,4}/g).join(' ');

        // --- COMPONENTS ---
        const InteractiveButton = ({ children, onClick, className, icon, style }) => (
            <motion.button whileHover={{ scale: 1.02, y: -1 }} whileTap={{ scale: 0.97 }} onClick={onClick} className={className} style={style}>
                {icon && <Icon path={icon} />}
                {children}
            </motion.button>
        );

        function App() {
            const [theme, setTheme] = useState(localStorage.getItem('theme') || 'light');
            const [lang, setLang] = useState(localStorage.getItem('ibanr_lang') || 'fr');
            const [activeTab, setActiveTab] = useState('generator');
            const [country, setCountry] = useState('FR');
            const [currentIban, setCurrentIban] = useState('');
            const [history, setHistory] = useState(() => JSON.parse(localStorage.getItem('ibanr_history') || '[]'));
            const [showHistory, setShowHistory] = useState(false);
            const [valInput, setValInput] = useState('');
            const [bulkCount, setBulkCount] = useState(50);
            const [toastState, setToastState] = useState({ show: false, msg: '' });
            const toastTimer = useRef(null);
            
            const [quoteIndex, setQuoteIndex] = useState(0);

            const t = i18n[lang];

            useEffect(() => { 
                document.getElementById('loader').style.display = 'none'; 
                setQuoteIndex(Math.floor(Math.random() * funnyQuotes[lang].length));
            }, []);

            useEffect(() => {
                document.documentElement.className = theme === 'dark' ? 'dark-theme' : '';
                localStorage.setItem('theme', theme);
            }, [theme]);

            useEffect(() => {
                localStorage.setItem('ibanr_lang', lang);
                setQuoteIndex(Math.floor(Math.random() * funnyQuotes[lang].length));
            }, [lang]);

            const playPop = () => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator(); const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.frequency.setValueAtTime(800, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    osc.start(); osc.stop(ctx.currentTime + 0.1);
                } catch(e) {}
            };

            const handleCopy = (txt, label = t.toastCopied) => {
                navigator.clipboard.writeText(txt).then(() => {
                    playPop();
                    if (toastTimer.current) clearTimeout(toastTimer.current);
                    setToastState({ show: true, msg: `${label} : ${txt}` });
                    toastTimer.current = setTimeout(() => { setToastState({ show: false, msg: '' }); }, 2000);
                });
            };

            const generateNew = useCallback(() => {
                const iban = generateRawIban(country);
                setCurrentIban(iban);
                setHistory(prev => {
                    const newHist = [iban, ...prev.filter(i => i !== iban)].slice(0, 10);
                    localStorage.setItem('ibanr_history', JSON.stringify(newHist));
                    return newHist;
                });
                
                if(Math.random() > 0.7) {
                     setQuoteIndex(Math.floor(Math.random() * funnyQuotes[lang].length));
                }
            }, [country, lang]);

            useEffect(() => { if(!currentIban) generateNew(); }, [generateNew, currentIban]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT') return;
                    if (e.code === 'Space') { e.preventDefault(); generateNew(); }
                    if (e.code === 'KeyC' && e.ctrlKey && e.shiftKey) { e.preventDefault(); handleCopy(currentIban, t.toastFull); }
                    if (e.code === 'Escape') setShowHistory(false);
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [generateNew, currentIban, t]);

            const getValidationStatus = () => {
                const v = valInput.replace(/\s/g,'').toUpperCase();
                if(v.length < 15) return null;
                try {
                    const s = (v.slice(4) + v.slice(0,4)).split('').map(c => /[A-Z]/.test(c) ? (c.charCodeAt(0)-55).toString() : c).join('');
                    return BigInt(s) % 97n === 1n;
                } catch { return false; }
            };
            const isValid = getValidationStatus();

            const handleExport = () => {
                let csv = `\uFEFFIBAN;PAYS\r\n`; 
                for(let i=0; i<bulkCount; i++) {
                    const iban = generateRawIban(country);
                    let formattedStr = ""; let currentIdx = 0;
                    blockConfig[country].forEach(size => { formattedStr += iban.substring(currentIdx, currentIdx + size) + " "; currentIdx += size; });
                    csv += `"${formattedStr.trim()}";"${country}"\r\n`;
                }
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `ibanr_export_${country}_${bulkCount}.csv`; a.click();
                window.URL.revokeObjectURL(url);
            };

            const blockVariants = { hidden: { opacity: 0, y: 10 }, show: { opacity: 1, y: 0, transition: { type: "spring", stiffness: 300 } } };
            const containerVariants = { hidden: { opacity: 0 }, show: { opacity: 1, transition: { staggerChildren: 0.05 } } };
            const rightColumnVariants = { initial: { opacity: 0, scale: 0.98 }, animate: { opacity: 1, scale: 1, transition: { duration: 0.2 } }, exit: { opacity: 0, scale: 0.98, transition: { duration: 0.1 } } };

            return (
                <React.Fragment>
                    <div className="floating-controls">
                        <motion.button whileHover={{ scale: 1.05 }} whileTap={{ scale: 0.9 }} className="icon-btn" 
                            onClick={() => setLang(l => l === 'fr' ? 'en' : 'fr')} title={t.langTitle} 
                            style={{fontWeight: 800, fontSize: '13px', fontFamily: 'var(--font-mono)'}}>
                            {lang === 'fr' ? 'EN' : 'FR'}
                        </motion.button>
                        <motion.button whileHover={{ scale: 1.05 }} whileTap={{ scale: 0.9 }} className="icon-btn" onClick={() => setShowHistory(true)} title={t.historyTitle}>
                            <Icon path={icons.history} />
                        </motion.button>
                        <motion.button whileHover={{ scale: 1.05 }} whileTap={{ scale: 0.9 }} className="icon-btn" onClick={() => setTheme(tm => tm === 'light' ? 'dark' : 'light')} title={t.themeTitle}>
                            <Icon path={theme === 'light' ? icons.moon : icons.sun} />
                        </motion.button>
                    </div>

                    <div className="container">
                        <div className="card">
                            
                            <div className="layout-left">
                                <header>
                                    <h1><Icon path={icons.wallet} className="logo-icon" size={26} /> ibanr</h1>
                                    <p className="subtitle">{funnyQuotes[lang][quoteIndex]}</p>
                                </header>

                                <div className="segmented-control">
                                    <button className={`segment-btn ${activeTab === 'generator' ? 'active' : ''}`} onClick={() => setActiveTab('generator')}>{t.genTab}</button>
                                    <button className={`segment-btn ${activeTab === 'validator' ? 'active' : ''}`} onClick={() => setActiveTab('validator')}>{t.valTab}</button>
                                    <button className={`segment-btn ${activeTab === 'bulk' ? 'active' : ''}`} onClick={() => setActiveTab('bulk')}>{t.bulkTab}</button>
                                </div>

                                <div className="form-section">
                                    {activeTab === 'generator' && (
                                        <motion.div initial={{opacity:0}} animate={{opacity:1}} style={{display:'flex', flexDirection:'column', height:'100%'}}>
                                            <div className="field-group">
                                                <label>{t.selectCountry}</label>
                                                <select value={country} onChange={(e) => setCountry(e.target.value)}>
                                                    {Object.entries(countryLabels[lang]).map(([code, label]) => (
                                                        <option key={code} value={code}>{label}</option>
                                                    ))}
                                                </select>
                                            </div>
                                            <div style={{ textAlign:'center', marginBottom:'16px', color:'var(--text-muted)' }}>
                                                <kbd>Space</kbd> {t.spaceHint}
                                            </div>
                                            <InteractiveButton onClick={generateNew} className="btn-generate" icon={icons.sparkles}>
                                                {t.btnGen}
                                            </InteractiveButton>
                                        </motion.div>
                                    )}

                                    {activeTab === 'validator' && (
                                        <motion.div initial={{opacity:0}} animate={{opacity:1}} style={{display:'flex', flexDirection:'column', height:'100%'}}>
                                            <div className="field-group">
                                                <label>{t.pasteIban}</label>
                                                <input type="text" placeholder="Ex: FR76 3000..." value={valInput} onChange={(e) => setValInput(e.target.value)} />
                                            </div>
                                            <p style={{fontSize:'12px', color:'var(--text-muted)', lineHeight:'1.5', marginTop:'auto', paddingBottom:'16px'}}>
                                                {t.valSubtitle}
                                            </p>
                                        </motion.div>
                                    )}

                                    {activeTab === 'bulk' && (
                                        <motion.div initial={{opacity:0}} animate={{opacity:1}} style={{display:'flex', flexDirection:'column', height:'100%'}}>
                                            <div className="field-group">
                                                <label>{t.bulkVolume}</label>
                                                <select value={bulkCount} onChange={(e) => setBulkCount(Number(e.target.value))}>
                                                    <option value={10}>10 {t.entries}</option>
                                                    <option value={50}>50 {t.entries}</option>
                                                    <option value={100}>100 {t.entries}</option>
                                                    <option value={500}>500 {t.entries}</option>
                                                </select>
                                            </div>
                                            <p style={{fontSize:'12px', color:'var(--text-muted)', lineHeight:'1.5', marginTop:'auto', paddingBottom:'16px'}}>
                                                {t.bulkDesc}
                                            </p>
                                            <InteractiveButton onClick={handleExport} className="btn-generate" icon={icons.download}>
                                                {t.bulkBtn}
                                            </InteractiveButton>
                                        </motion.div>
                                    )}
                                </div>
                            </div>

                            <AnimatePresence mode="wait">
                                {activeTab === 'generator' && (
                                    <motion.div key="right-gen" variants={rightColumnVariants} initial="initial" animate="animate" exit="exit" className="layout-right">
                                        <div className="section-title"><Icon path={icons.copy} size={16}/> {t.standardFormat}</div>
                                        <motion.div variants={containerVariants} initial="hidden" animate="show" key={currentIban} className="blocks-container">
                                            {(() => {
                                                let blocks = []; let idx = 0;
                                                blockConfig[country]?.forEach((size, i) => {
                                                    const text = currentIban.substring(idx, idx + size);
                                                    blocks.push(
                                                        <motion.div key={i} variants={blockVariants} whileHover={{ scale: 1.05, y:-2, borderColor: 'var(--primary)', color: 'var(--primary)', boxShadow: '0 4px 12px rgba(37,99,235,0.15)' }} whileTap={{ scale: 0.95 }}
                                                            className="iban-block" onClick={() => handleCopy(text, t.toastBlock)}>
                                                            {text}
                                                        </motion.div>
                                                    );
                                                    idx += size;
                                                });
                                                return blocks;
                                            })()}
                                        </motion.div>
                                        <InteractiveButton onClick={() => handleCopy(currentIban, t.toastFull)} className="btn-generate" style={{ background: 'transparent', color: 'var(--text-main)', border: '2px dashed var(--border)', marginTop:'auto' }} icon={icons.copy}>
                                            {t.copyFullBtn}
                                        </InteractiveButton>
                                    </motion.div>
                                )}

                                {activeTab === 'validator' && (
                                    <motion.div key="right-val" variants={rightColumnVariants} initial="initial" animate="animate" exit="exit" className="layout-right">
                                        <div className="val-result">
                                            {isValid === null && (
                                                <motion.div initial={{opacity:0}} animate={{opacity:1}} style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
                                                    <div className="val-icon neutral"><Icon path={icons.shield} size={28}/></div>
                                                    <h3 style={{fontSize:'18px', marginBottom:'8px'}}>{t.valWait}</h3>
                                                    <p style={{color:'var(--text-muted)', fontSize:'14px'}}>{t.valWaitDesc}</p>
                                                </motion.div>
                                            )}
                                            {isValid === true && (
                                                <motion.div initial={{scale:0.8, opacity:0}} animate={{scale:1, opacity:1}} style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
                                                    <div className="val-icon success"><Icon path={icons.check} size={32}/></div>
                                                    <h3 style={{fontSize:'20px', color:'var(--success)', marginBottom:'8px'}}>{t.valValid}</h3>
                                                    <p style={{color:'var(--text-muted)', fontSize:'14px'}}>{t.valValidDesc}</p>
                                                </motion.div>
                                            )}
                                            {isValid === false && (
                                                <motion.div initial={{scale:0.8, opacity:0}} animate={{scale:1, opacity:1}} style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
                                                    <div className="val-icon error"><Icon path={icons.x} size={32}/></div>
                                                    <h3 style={{fontSize:'20px', color:'var(--danger)', marginBottom:'8px'}}>{t.valInvalid}</h3>
                                                    <p style={{color:'var(--text-muted)', fontSize:'14px'}}>{t.valInvalidDesc}</p>
                                                </motion.div>
                                            )}
                                        </div>
                                    </motion.div>
                                )}

                                {activeTab === 'bulk' && (
                                    <motion.div key="right-bulk" variants={rightColumnVariants} initial="initial" animate="animate" exit="exit" className="layout-right">
                                        <div className="val-result">
                                            <div className="val-icon neutral"><Icon path={icons.database} size={28}/></div>
                                            <h3 style={{fontSize:'18px', marginBottom:'8px'}}>{t.bulkReady}</h3>
                                            <p style={{color:'var(--text-muted)', fontSize:'14px'}}>{t.bulkReadyDesc}</p>
                                        </div>
                                    </motion.div>
                                )}
                            </AnimatePresence>
                        </div>

                        <footer>
                            {t.madeBy} <a href="https://www.linkedin.com/in/pcarouge" target="_blank" rel="noreferrer">Paul Carouge</a>
                        </footer>
                    </div>

                    <AnimatePresence>
                        {showHistory && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="modal-overlay" onClick={() => setShowHistory(false)}>
                                <motion.div initial={{ scale: 0.95, y: 20 }} animate={{ scale: 1, y: 0 }} exit={{ scale: 0.95, y: 20 }} className="modal-content" onClick={e => e.stopPropagation()}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '24px' }}>
                                        <h2 style={{ fontSize: '20px', fontWeight: 800 }}>{t.historyTitle}</h2>
                                        <button onClick={() => setShowHistory(false)} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--text-muted)' }}>
                                            <Icon path={icons.x} />
                                        </button>
                                    </div>
                                    <div className="history-list">
                                        {history.length === 0 ? <p style={{textAlign:'center', color:'var(--text-muted)'}}>{t.emptyHistory}</p> : history.map((iban, i) => (
                                            <motion.div whileHover={{ scale: 1.02, borderColor: 'var(--primary)', color: 'var(--primary)' }} whileTap={{ scale: 0.98 }} key={i} className="history-item" onClick={() => { handleCopy(iban, t.toastHistory); setShowHistory(false); }}>
                                                <span>{formatIban(iban)}</span>
                                                <Icon path={icons.copy} size={16}/>
                                            </motion.div>
                                        ))}
                                    </div>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    <AnimatePresence>
                        {toastState.show && (
                            <motion.div
                                initial={{ opacity: 0, y: 30, x: "-50%" }}
                                animate={{ opacity: 1, y: 0, x: "-50%" }}
                                exit={{ opacity: 0, y: 30, x: "-50%" }}
                                className="toast"
                            >
                                <Icon path={icons.check} size={18} /> {toastState.msg}
                            </motion.div>
                        )}
                    </AnimatePresence>

                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
